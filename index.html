<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piyanoyla Yolculuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.firebaseModules = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc };
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Lora', 'serif'], serif: ['Cinzel', 'serif'] },
                    colors: { gold: { 400: '#D4AF37', 500: '#AA8C2C', 600: '#806921' }, dark: { 900: '#0B0F19', 800: '#151D2E', 700: '#1F2B45' } }
                }
            }
        }
    </script>
    <style>
        /* Yalpalama hatasını çözmek için overflow-y: scroll eklendi */
        body { background-color: #0B0F19; color: #F8FAFC; overflow-y: scroll; }
        .glass-panel { background: rgba(21, 29, 46, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0B0F19; }
        ::-webkit-scrollbar-thumb { background: #1F2B45; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #side-drawer { transition: transform 0.3s ease-in-out; }
        .drawer-open { transform: translateX(0); }
        .drawer-closed { transform: translateX(100%); }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Global Modal -->
    <div id="custom-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/70 backdrop-blur-md p-4">
        <div class="glass-panel w-full max-w-md rounded-2xl p-6 shadow-2xl border border-gold-500/30 transform scale-95 transition-transform duration-300" id="modal-content">
            <h3 id="modal-title" class="text-2xl font-serif font-bold text-gold-400 mb-2"></h3>
            <p id="modal-message" class="text-slate-300 mb-6 leading-relaxed whitespace-pre-wrap"></p>
            <div class="flex justify-end">
                <button onclick="window.closeModal()" class="px-6 py-2.5 bg-gold-500 hover:bg-gold-400 text-dark-900 font-bold rounded-lg transition-colors">Tamam</button>
            </div>
        </div>
    </div>

    <!-- Side Drawer Menu -->
    <div id="drawer-overlay" onclick="window.toggleDrawer()" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm transition-opacity"></div>
    <div id="side-drawer" class="fixed top-0 right-0 h-full w-80 bg-dark-900 border-l border-gold-500/20 z-50 drawer-closed shadow-2xl flex flex-col">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <span class="font-serif font-bold text-xl text-white">Menü</span>
            <button onclick="window.toggleDrawer()" class="text-slate-400 hover:text-gold-400 text-2xl transition-colors"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-grow p-6 flex flex-col space-y-4 overflow-y-auto">
            <button onclick="window.navigate('home'); window.toggleDrawer()" class="text-left text-lg text-slate-300 hover:text-gold-400 transition-colors py-2"><i class="fas fa-home w-8"></i> Ana Sayfa</button>
            <button onclick="window.navigate('library'); window.toggleDrawer()" class="text-left text-lg text-slate-300 hover:text-gold-400 transition-colors py-2"><i class="fas fa-headphones w-8"></i> Kütüphane</button>
            <button onclick="window.navigate('blog'); window.toggleDrawer()" class="text-left text-lg text-slate-300 hover:text-gold-400 transition-colors py-2"><i class="fas fa-pen-nib w-8"></i> Blog</button>
            <button onclick="window.navigate('tutorial'); window.toggleDrawer()" class="text-left text-lg text-slate-300 hover:text-gold-400 transition-colors py-2"><i class="fas fa-play-circle w-8"></i> Nasıl Çalınır?</button>
            <button onclick="window.navigate('about'); window.toggleDrawer()" class="text-left text-lg text-slate-300 hover:text-gold-400 transition-colors py-2"><i class="fas fa-info-circle w-8"></i> Hakkımızda</button>
            <button onclick="window.navigate('contact'); window.toggleDrawer()" class="text-left text-lg text-slate-300 hover:text-gold-400 transition-colors py-2"><i class="fas fa-envelope w-8"></i> İletişim</button>
            <div class="h-px w-full bg-slate-800 my-4"></div>
            <button onclick="window.openSearch(); window.toggleDrawer()" class="text-left text-lg text-slate-300 hover:text-gold-400 transition-colors py-2"><i class="fas fa-search w-8"></i> Arama Yap</button>
            <div id="admin-menu-container"></div>
            <div id="drawer-auth-container" class="mt-auto pt-8"></div>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="fixed inset-0 z-[60] hidden flex items-start justify-center bg-black/80 backdrop-blur-md pt-20 p-4">
        <div class="w-full max-w-2xl bg-dark-800 rounded-2xl shadow-2xl border border-gold-500/20 overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-slate-700 flex items-center relative">
                <i class="fas fa-search text-slate-400 absolute left-8"></i>
                <input type="text" id="global-search-input" placeholder="Site içinde ara (Örn: yiruma, notalar...)" class="w-full bg-dark-900 border border-slate-600 rounded-xl py-4 pl-12 pr-12 text-white font-sans focus:outline-none focus:border-gold-400 transition-colors">
                <button onclick="window.closeSearch()" class="absolute right-8 text-slate-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="search-results" class="p-4 overflow-y-auto hidden"></div>
            <div id="search-empty" class="p-8 text-center text-slate-400 font-sans">Aramak istediğiniz kelimeyi yazın...</div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="sticky top-0 z-30 glass-panel border-b border-gold-500/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.navigate('home')">
                    <i class="fas fa-music text-gold-400 text-3xl mr-3"></i>
                    <span class="font-serif font-bold text-2xl tracking-wide text-white">Piyanoyla<span class="text-gold-400">Yolculuk</span></span>
                </div>
                <div class="flex items-center space-x-6">
                    <button onclick="window.handleProfileClick()" class="text-slate-300 hover:text-gold-400 text-2xl transition-colors"><i class="fas fa-user-circle"></i></button>
                    <button onclick="window.toggleDrawer()" class="text-slate-300 hover:text-gold-400 focus:outline-none flex items-center space-x-2">
                        <span class="hidden sm:block font-medium tracking-widest uppercase text-sm">Menü</span>
                        <i class="fas fa-bars text-3xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="flex-grow w-full relative"></main>

    <!-- Footer -->
    <footer class="bg-dark-900 border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto py-10 px-4 flex flex-col md:flex-row justify-between items-center">
            <div class="mb-6 md:mb-0 text-center md:text-left">
                <span class="font-serif text-2xl font-bold text-white">Piyanoyla<span class="text-gold-400">Yolculuk</span></span>
                <p class="text-slate-400 mt-2 font-sans">Tüm hakları saklıdır. Piyanoyla Yolculuk, 2026 ©</p>
            </div>
            <div class="flex space-x-6">
                <a href="#" class="text-slate-400 hover:text-[#FF0000] transition-colors flex items-center group">
                    <i class="fab fa-youtube text-3xl mr-3 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">YouTube Kanalım</span>
                </a>
            </div>
        </div>
    </footer>

    <script>
        const EMAILJS_PUBLIC_KEY = "Q_vMWRSfGntqi2TPl"; 
        const EMAILJS_SERVICE_ID = "Piyanoyla_Yolculuk_ID"; 
        const EMAILJS_TEMPLATE_ID = "piyanoyla_yolculuk_ID";
        const ADMIN_EMAIL = "admin@piyanoylayolculuk.com";

        const INITIAL_DATA = {
            library: [
                { id: '1', type: 'music', title: "Interstellar - Main Theme", duration: "4:12", size: "3.5 MB", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", note: "Filmin ikonik ana teması." },
                { id: '2', type: 'music', title: "Yiruma - River Flows in You", duration: "3:05", size: "4.1 MB", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", note: "" },
                { id: '3', type: 'sfx', title: "Metronom Sesi", duration: "1:00", size: "1.2 MB", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", note: "Pratik için standart 60 bpm." }
            ],
            blogs: [
                { id: '1', title: "Piyanoya Yeni Başlayanlar İçin", excerpt: "Piyano çalmaya yeni karar verdiyseniz...", content: "<p class='mb-4'>İlk kural kesinlikle doğru oturuş pozisyonudur.</p>", date: "12 Haziran 2026", image: "https://images.unsplash.com/photo-1552422535-c45813c61732?q=80&w=800&auto=format&fit=crop", views: 0, likes: 0 }
            ],
            tutorials: [
                { id: '1', title: "Interstellar Kolay Versiyon", youtubeId: "7maJOI3QMu0", notes: "A minör akorunun çevrimleri üzerinde dönen bu parçada pedalı çok temiz kullanmak hayati önem taşır." }
            ],
            about: "Müziğin evrensel dilini piyanoyla ifade etmek ve bu tutkuyu herkesle paylaşmak amacıyla kurulan platformumuz sadece bir YouTube kanalı değil, sanatla nefes alan bir ailedir.\n\n\"Müzik, kelimelerin bittiği yerde başlar.\"",
            messages: []
        };

        window.state = { 
            currentUser: null, 
            currentView: 'home', 
            activeBlogId: null,
            authFlow: { step: 'register', tempData: null, verificationCode: null, intent: null },
            dbUsers: [], 
            appId: '1:822753411196:web:46a5a6f034da93663c89f9', 
            fbUser: null,
            libraryTab: 'music',
            tutorialSearchQuery: '',
            adminTab: 'blogs',
            data: INITIAL_DATA,
            homeSlide: 0
        };

        let db, auth, onSnapshotFn, collectionFn, docFn, setDocFn, getDocFn, updateDocFn, deleteDocFn, signInPopupFn, gProvider;

        const firebaseConfig = {
          apiKey: "AIzaSyBdzBkbivLlkuL6xgrV2ASeIrkOXc4zYgo",
          authDomain: "piyanoyla-yolculuk.firebaseapp.com",
          projectId: "piyanoyla-yolculuk",
          storageBucket: "piyanoyla-yolculuk.firebasestorage.app",
          messagingSenderId: "822753411196",
          appId: "1:822753411196:web:46a5a6f034da93663c89f9"
        };

        window.onload = () => {
            const initFirebase = async () => {
                // Firebase modüllerinin yüklenmesini bekle (Sayfanın çökmesini engeller)
                if (!window.firebaseModules) {
                    setTimeout(initFirebase, 100);
                    return;
                }
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } = window.firebaseModules;
                onSnapshotFn = onSnapshot; collectionFn = collection; docFn = doc; setDocFn = setDoc; getDocFn = getDoc; updateDocFn = updateDoc; deleteDocFn = deleteDoc;
                signInPopupFn = signInWithPopup; gProvider = new GoogleAuthProvider();
                
                try {
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, async (user) => {
                        window.state.fbUser = user;
                        if (user) { initDatabaseListeners(); checkActiveSession(); }
                    });
                } catch (e) {
                    console.error("Firebase init error:", e);
                }
            };
            initFirebase();
            try { emailjs.init(EMAILJS_PUBLIC_KEY); } catch(e){}
        };

        function initDatabaseListeners() {
            if (!window.state.fbUser) return;
            
            onSnapshotFn(collectionFn(db, 'artifacts', window.state.appId, 'users'), (snap) => {
                let u = []; snap.forEach(doc => u.push({ id: doc.id, ...doc.data() })); window.state.dbUsers = u;
            });
            onSnapshotFn(collectionFn(db, 'artifacts', window.state.appId, 'blogs'), (snap) => {
                let items = []; snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                if(items.length > 0) window.state.data.blogs = items;
                if(['blog', 'single-blog', 'admin'].includes(window.state.currentView)) window.render();
            });
            onSnapshotFn(collectionFn(db, 'artifacts', window.state.appId, 'library'), (snap) => {
                let items = []; snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                if(items.length > 0) window.state.data.library = items;
                if(['library', 'admin'].includes(window.state.currentView)) window.render();
            });
            onSnapshotFn(collectionFn(db, 'artifacts', window.state.appId, 'tutorials'), (snap) => {
                let items = []; snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                if(items.length > 0) window.state.data.tutorials = items;
                if(['tutorial', 'admin'].includes(window.state.currentView)) window.render();
            });
            onSnapshotFn(docFn(db, 'artifacts', window.state.appId, 'settings', 'about'), (snap) => {
                if(snap.exists() && snap.data().text) window.state.data.about = snap.data().text;
                if(['about', 'admin'].includes(window.state.currentView)) window.render();
            });
            onSnapshotFn(collectionFn(db, 'artifacts', window.state.appId, 'messages'), (snap) => {
                let items = []; snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                window.state.data.messages = items.sort((a,b) => b.timestamp - a.timestamp);
                if(window.state.currentView === 'admin' && window.state.adminTab === 'messages') window.render();
            });
        }

        async function checkActiveSession() {
            try {
                const sRef = docFn(db, 'artifacts', window.state.appId, 'users', window.state.fbUser.uid, 'session', 'current');
                const snap = await getDocFn(sRef);
                if (snap.exists() && snap.data().customUserId) {
                    const cId = snap.data().customUserId;
                    const uSnap = await getDocFn(docFn(db, 'artifacts', window.state.appId, 'users', cId));
                    if(uSnap.exists()) window.state.currentUser = { id: uSnap.id, ...uSnap.data() };
                }
            } catch(e) {}
            window.render();
        }

        window.navigate = (view, payload = null) => { window.state.currentView = view; if(view === 'single-blog') window.state.activeBlogId = payload; window.render(); window.scrollTo(0, 0); };
        window.handleProfileClick = () => { window.state.currentUser ? window.navigate('settings') : window.navigate('auth'); };
        
        window.showModal = (title, message) => {
            document.getElementById('modal-title').innerText = title; document.getElementById('modal-message').innerText = message;
            const m = document.getElementById('custom-modal'), c = document.getElementById('modal-content');
            m.classList.remove('hidden'); setTimeout(() => c.classList.replace('scale-95', 'scale-100'), 10);
        };
        window.closeModal = () => {
            const m = document.getElementById('custom-modal'), c = document.getElementById('modal-content');
            c.classList.replace('scale-100', 'scale-95'); setTimeout(() => m.classList.add('hidden'), 300);
        };
        
        window.toggleDrawer = () => {
            const d = document.getElementById('side-drawer'), o = document.getElementById('drawer-overlay');
            d.classList.toggle('drawer-closed'); d.classList.toggle('drawer-open'); o.classList.toggle('hidden');
        };
        
        window.normalizeText = (t) => t ? t.toString().toLowerCase().replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ı/g, 'i').replace(/ö/g, 'o').replace(/ç/g, 'c').normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, '') : "";

        async function saveSession(cid) { if(window.state.fbUser) await setDocFn(docFn(db, 'artifacts', window.state.appId, 'users', window.state.fbUser.uid, 'session', 'current'), { customUserId: cid }); }
        async function clearSession() { if(window.state.fbUser) { await deleteDocFn(docFn(db, 'artifacts', window.state.appId, 'users', window.state.fbUser.uid, 'session', 'current')); window.state.currentUser = null; } }

        window.sendEmailVerification = async (email, code) => {
            try { await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { to_email: email, to_name: window.state.authFlow.tempData?.name || window.state.currentUser?.name || "Kullanıcı", verification_code: code }); return true; } 
            catch (err) { window.showModal("Hata", `E-posta gönderilemedi. Test kodunuz: ${code}`); return true; }
        };

        window.updateNavUI = () => {
            const aC = document.getElementById('drawer-auth-container'), adminC = document.getElementById('admin-menu-container');
            if(adminC) adminC.innerHTML = window.state.currentUser?.isAdmin ? `<button onclick="window.navigate('admin'); window.toggleDrawer()" class="text-left text-lg text-gold-400 hover:text-white transition-colors py-2 border-t border-slate-800 mt-4 w-full"><i class="fas fa-crown w-8"></i> Yönetici Paneli</button>` : '';
            if(aC) aC.innerHTML = window.state.currentUser ? `<div class="bg-dark-800 rounded-xl p-4 border border-gold-500/20 mb-4"><div class="text-sm text-slate-400 mb-1">Giriş Yapıldı</div><div class="text-gold-400 font-serif font-bold text-lg">${window.state.currentUser.name} ${window.state.currentUser.surname}</div></div><button onclick="window.navigate('settings'); window.toggleDrawer()" class="w-full text-left text-lg text-white hover:text-gold-400 transition-colors py-3 border-t border-slate-800"><i class="fas fa-cog w-8"></i> Ayarlar</button><button onclick="window.handleLogout(); window.toggleDrawer()" class="w-full text-left text-lg text-[#FF0000] hover:text-red-400 transition-colors py-3 border-t border-slate-800"><i class="fas fa-sign-out-alt w-8"></i> Çıkış Yap</button>` : `<button onclick="window.navigate('auth'); window.toggleDrawer()" class="w-full py-4 rounded-xl bg-gold-500 hover:bg-gold-400 text-dark-900 font-serif font-bold text-lg transition-colors">Giriş Yap / Kaydol</button>`;
        };

        window.render = () => {
            window.updateNavUI(); const m = document.getElementById('main-content'); let c = '';
            switch(window.state.currentView) {
                case 'home': c = renderHome(); break;
                case 'library': c = renderLibrary(); break;
                case 'blog': c = renderBlogList(); break;
                case 'single-blog': c = renderSingleBlog(); break;
                case 'tutorial': c = renderTutorials(); break;
                case 'about': c = renderAbout(); break;
                case 'contact': c = renderContact(); break;
                case 'auth': c = renderAuth(); break;
                case 'settings': c = renderSettings(); break;
                case 'admin': c = renderAdmin(); break;
                default: c = renderHome();
            }
            m.innerHTML = `<div class="fade-in min-h-[80vh]">${c}</div>`;
        };

        function renderHome() {
            const authBtns = window.state.currentUser ? '' : `<button onclick="window.setAuthStep('register'); window.navigate('auth')" class="px-8 py-4 bg-transparent border-2 border-gold-500 text-gold-400 hover:bg-gold-500 hover:text-dark-900 rounded-lg font-serif font-bold text-lg transition-all w-full sm:w-auto"><i class="fas fa-user-plus mr-2"></i> Hemen Kaydol</button>`;
            
            // Slider İçerikleri (En yeni içerikler derleniyor)
            const sliderItems = [
                ...window.state.data.blogs.map(b => ({ type: 'Blog', title: b.title, desc: b.excerpt, img: b.image, link: `window.navigate('single-blog', '${b.id}')` })),
                ...window.state.data.library.map(l => ({ type: 'Kütüphane', title: l.title, desc: l.note || 'Yeni müzik/ses eklendi', img: 'https://images.unsplash.com/photo-1520523839897-bd0b52f945a0?q=80&w=800', link: `window.navigate('library')` })),
                ...window.state.data.tutorials.map(t => ({ type: 'Eğitim', title: t.title, desc: (t.notes || '').substring(0, 50)+'...', img: `https://img.youtube.com/vi/${t.youtubeId}/hqdefault.jpg`, link: `window.navigate('tutorial')` }))
            ].slice(0, 5); // Son eklenen 5 içerik

            let sliderHtml = '';
            if(sliderItems.length > 0) {
                const slides = sliderItems.map((item, idx) => `
                    <div class="min-w-full relative h-[450px] flex items-center justify-center cursor-pointer group" onclick="${item.link}">
                        <img src="${item.img}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                        <div class="absolute inset-0 bg-gradient-to-t from-dark-900/90 via-dark-900/30 to-transparent"></div>
                        <div class="relative z-10 text-center px-6 max-w-3xl transform group-hover:scale-105 transition-transform duration-500 mt-8">
                            <span class="inline-block px-5 py-1.5 rounded-full bg-gold-500 text-dark-900 font-bold text-sm mb-5 shadow-lg">${item.type}</span>
                            <h3 class="text-3xl md:text-5xl font-serif font-bold text-white mb-4 drop-shadow-xl">${item.title}</h3>
                            <p class="text-lg md:text-xl text-slate-100 drop-shadow-md font-sans leading-relaxed">${item.desc}</p>
                        </div>
                    </div>
                `).join('');
                
                const dots = sliderItems.map((_, idx) => `
                    <button onclick="window.goToSlide(${idx})" class="w-3 h-3 rounded-full transition-colors ${window.state.homeSlide === idx ? 'bg-gold-400 w-8' : 'bg-slate-600 hover:bg-slate-400'}"></button>
                `).join('');

                sliderHtml = `
                <div class="w-full max-w-6xl mx-auto mt-20 px-4">
                    <h2 class="text-4xl font-serif font-bold text-white mb-8 border-b border-gold-500/20 pb-4">Yeni <span class="text-gold-400">Eklenenler</span></h2>
                    <div class="relative overflow-hidden rounded-3xl bg-dark-800 border border-slate-700 shadow-[0_0_40px_rgba(212,175,55,0.05)]">
                        <div class="flex transition-transform duration-700 ease-out" style="transform: translateX(-${window.state.homeSlide * 100}%)">
                            ${slides}
                        </div>

        window.cancelAdminAction = () => { window.state.adminAction = null; window.render(); };

        function renderAdmin() {
            if(!window.state.currentUser?.isAdmin) { window.navigate('home'); return ''; }
            
            // Eğer bir düzenleme/silme işlemi açıksa formu göster
            if (window.state.adminAction) {
                const { action, id, collection } = window.state.adminAction;
                
                if (action === 'delete') {
                    return `<div class="max-w-xl mx-auto px-4 py-20 text-center"><div class="glass-panel p-8 rounded-xl"><h3 class="text-3xl text-[#FF0000] mb-4 font-serif font-bold">Silme Onayı</h3><p class="text-white mb-8 text-lg">Bu öğeyi kalıcı olarak silmek istediğinize emin misiniz?</p><div class="flex justify-center space-x-4"><button onclick="window.executeDelete('${collection}', '${id}')" class="bg-[#FF0000] hover:bg-red-400 text-white px-8 py-3 rounded-lg font-bold transition-colors">Evet, Sil</button><button onclick="window.cancelAdminAction()" class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-lg font-bold transition-colors">İptal</button></div></div></div>`;
                }
                
                if (action === 'edit-blog') {
                    const b = id ? window.state.data.blogs.find(x=>x.id===id) : {title:'', excerpt:'', content:'', image:''};
                    return `<div class="max-w-4xl mx-auto px-4 py-12"><div class="glass-panel p-8 rounded-xl"><h3 class="text-3xl text-gold-400 mb-6 font-serif font-bold">${id ? 'Blog Düzenle' : 'Yeni Blog Ekle'}</h3><div class="space-y-4"><input type="text" id="edit-b-title" placeholder="Başlık" value="${b.title}" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none"><input type="text" id="edit-b-image" placeholder="Görsel URL (Örn: https://...)" value="${b.image}" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none"><textarea id="edit-b-excerpt" placeholder="Kısa Özet" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none h-24">${b.excerpt}</textarea><textarea id="edit-b-content" placeholder="İçerik (HTML destekler)" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none h-64">${b.content}</textarea><div class="flex space-x-4 pt-4"><button onclick="window.saveBlog('${id || ''}')" class="bg-gold-500 hover:bg-gold-400 text-dark-900 px-8 py-3 rounded-lg font-bold transition-colors">Kaydet</button><button onclick="window.cancelAdminAction()" class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-lg font-bold transition-colors">İptal</button></div></div></div></div>`;
                }

                if (action === 'edit-library') {
                    const l = id ? window.state.data.library.find(x=>x.id===id) : {title:'', type:'music', url:'', note:'', duration:'0:00', size:'0 MB'};
                    return `<div class="max-w-4xl mx-auto px-4 py-12"><div class="glass-panel p-8 rounded-xl"><h3 class="text-3xl text-gold-400 mb-6 font-serif font-bold">${id ? 'Kütüphane Öğesini Düzenle' : 'Yeni Müzik / Ses Efekti Ekle'}</h3><div class="space-y-5">
                        <select id="edit-l-type" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none"><option value="music" ${l.type==='music'?'selected':''}>Müzik</option><option value="sfx" ${l.type==='sfx'?'selected':''}>Ses Efekti</option></select>
                        <input type="text" id="edit-l-title" placeholder="Başlık" value="${l.title}" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none">
                        
                        <!-- Dosya Yükleme Alanı -->
                        <div class="p-6 border border-slate-600 rounded-xl bg-dark-800">
                            <label class="block text-gold-400 mb-3 font-bold text-lg"><i class="fas fa-file-audio mr-2"></i>MP3 Dosyası Seç (Bilgisayardan)</label>
                            <input type="file" id="edit-l-file" accept="audio/*" class="w-full text-slate-300 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-gold-500 file:text-dark-900 hover:file:bg-gold-400 transition-colors cursor-pointer" onchange="window.handleAudioFile(event)">
                            <p class="text-sm text-slate-400 mt-4"><i class="fas fa-magic text-gold-400 mr-1"></i> Dosya seçtiğinizde <b>süre</b> ve <b>boyut</b> otomatik hesaplanacaktır.</p>
                            <p class="text-xs text-pink-400 mt-2">Not: 1MB'dan büyük dosyalar veritabanı sınırına takılabilir. Büyük dosyalar için alttaki URL alanını kullanmanız önerilir.</p>
                        </div>
                        
                        <div class="flex items-center space-x-4 py-2">
                            <hr class="flex-grow border-slate-700"><span class="text-slate-500 font-bold uppercase tracking-widest text-sm">Veya</span><hr class="flex-grow border-slate-700">
                        </div>
                        
                        <input type="text" id="edit-l-url" placeholder="MP3 Dosya URL'si (Elle girmek için)" value="${l.url}" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none">
                        <input type="text" id="edit-l-note" placeholder="Alt Not (İsteğe Bağlı)" value="${l.note}" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none">
                        
                        <div class="flex space-x-4">
                            <div class="w-1/2 bg-dark-900 border border-slate-600 rounded-xl p-4 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-gold-500"></div>
                                <span class="text-xs text-slate-500 block mb-2 uppercase font-bold tracking-wider">Süre (Otomatik)</span>
                                <input type="text" id="edit-l-duration" readonly value="${l.duration}" class="bg-transparent text-white font-serif text-2xl outline-none w-full">
                            </div>
                            <div class="w-1/2 bg-dark-900 border border-slate-600 rounded-xl p-4 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                                <span class="text-xs text-slate-500 block mb-2 uppercase font-bold tracking-wider">Boyut (Otomatik)</span>
                                <input type="text" id="edit-l-size" readonly value="${l.size}" class="bg-transparent text-white font-serif text-2xl outline-none w-full">
                            </div>
                        </div>
                        
                        <div class="flex space-x-4 pt-6"><button onclick="window.saveLibrary('${id || ''}')" class="bg-gold-500 hover:bg-gold-400 text-dark-900 px-8 py-3 rounded-lg font-bold transition-colors w-full shadow-lg shadow-gold-500/20"><i class="fas fa-save mr-2"></i> Kaydet</button><button onclick="window.cancelAdminAction()" class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-lg font-bold transition-colors w-full">İptal</button></div>
                    </div></div></div>`;
                }

                if (action === 'edit-tutorial') {
                    const t = id ? window.state.data.tutorials.find(x=>x.id===id) : {title:'', youtubeId:'', notes:''};
                    return `<div class="max-w-4xl mx-auto px-4 py-12"><div class="glass-panel p-8 rounded-xl"><h3 class="text-3xl text-gold-400 mb-6 font-serif font-bold">${id ? 'Eğitimi Düzenle' : 'Yeni Eğitim Ekle'}</h3><div class="space-y-4"><input type="text" id="edit-t-title" placeholder="Eğitim Başlığı" value="${t.title}" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none"><input type="text" id="edit-t-youtubeId" placeholder="YouTube Video ID (Örn: 7maJOI3QMu0)" value="${t.youtubeId}" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none"><textarea id="edit-t-notes" placeholder="Şarkı Notları" class="w-full bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none h-32">${t.notes}</textarea><div class="flex space-x-4 pt-4"><button onclick="window.saveTutorial('${id || ''}')" class="bg-gold-500 hover:bg-gold-400 text-dark-900 px-8 py-3 rounded-lg font-bold transition-colors">Kaydet</button><button onclick="window.cancelAdminAction()" class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-lg font-bold transition-colors">İptal</button></div></div></div></div>`;
                }
            }

            const t = window.state.adminTab; let content = '';
            if(t === 'blogs') { content = `<button onclick="window.adminEditBlog(null)" class="mb-6 bg-gold-500 hover:bg-gold-400 text-dark-900 px-6 py-3 rounded-lg font-bold transition-colors"><i class="fas fa-plus mr-2"></i> Yeni Blog</button><div class="space-y-3">` + window.state.data.blogs.map(b => `<div class="bg-dark-800 p-4 rounded-lg flex justify-between items-center border border-slate-700 hover:border-gold-500/30 transition-colors"><span class="font-serif text-lg text-white">${b.title}</span><div><button onclick="window.adminEditBlog('${b.id}')" class="text-blue-400 hover:text-blue-300 mr-4 text-xl"><i class="fas fa-edit"></i></button><button onclick="window.adminDelete('blogs','${b.id}')" class="text-[#FF0000] hover:text-red-400 text-xl"><i class="fas fa-trash"></i></button></div></div>`).join('') + `</div>`; } 
            else if(t === 'library') { content = `<button onclick="window.adminEditLibrary(null)" class="mb-6 bg-gold-500 hover:bg-gold-400 text-dark-900 px-6 py-3 rounded-lg font-bold transition-colors"><i class="fas fa-plus mr-2"></i> Yeni Müzik / SFX</button><div class="space-y-3">` + window.state.data.library.map(l => `<div class="bg-dark-800 p-4 rounded-lg flex justify-between items-center border border-slate-700 hover:border-gold-500/30 transition-colors"><span class="font-serif text-lg text-white"><span class="text-gold-400 text-sm mr-2">[${l.type.toUpperCase()}]</span> ${l.title}</span><div><button onclick="window.adminEditLibrary('${l.id}')" class="text-blue-400 hover:text-blue-300 mr-4 text-xl"><i class="fas fa-edit"></i></button><button onclick="window.adminDelete('library','${l.id}')" class="text-[#FF0000] hover:text-red-400 text-xl"><i class="fas fa-trash"></i></button></div></div>`).join('') + `</div>`; } 
            else if(t === 'tutorials') { content = `<button onclick="window.adminEditTutorial(null)" class="mb-6 bg-gold-500 hover:bg-gold-400 text-dark-900 px-6 py-3 rounded-lg font-bold transition-colors"><i class="fas fa-plus mr-2"></i> Yeni Eğitim</button><div class="space-y-3">` + window.state.data.tutorials.map(tut => `<div class="bg-dark-800 p-4 rounded-lg flex justify-between items-center border border-slate-700 hover:border-gold-500/30 transition-colors"><span class="font-serif text-lg text-white">${tut.title}</span><div><button onclick="window.adminEditTutorial('${tut.id}')" class="text-blue-400 hover:text-blue-300 mr-4 text-xl"><i class="fas fa-edit"></i></button><button onclick="window.adminDelete('tutorials','${tut.id}')" class="text-[#FF0000] hover:text-red-400 text-xl"><i class="fas fa-trash"></i></button></div></div>`).join('') + `</div>`; } 
            else if(t === 'messages') { 
                content = window.state.data.messages.length === 0 ? `<div class="text-center py-16"><i class="fas fa-envelope-open-text text-6xl text-slate-700 mb-4"></i><p class="text-slate-400 text-lg">Henüz hiç mesajınız bulunmuyor.</p></div>` : `<div class="space-y-6">` + window.state.data.messages.map(m => `
                <div class="bg-dark-800 p-6 md:p-8 rounded-2xl border border-slate-700 shadow-lg relative group">
                    <div class="flex flex-col md:flex-row md:justify-between md:items-start mb-6 border-b border-slate-700/50 pb-6">
                        <div>
                            <h4 class="text-gold-400 font-bold text-2xl flex items-center mb-2"><i class="fas fa-user-circle text-slate-500 mr-3"></i>${m.name}</h4>
                            <a href="mailto:${m.email}" class="text-blue-400 hover:text-blue-300 hover:underline flex items-center font-sans text-lg"><i class="fas fa-envelope mr-2"></i>${m.email}</a>
                        </div>
                        <span class="text-slate-400 text-sm bg-dark-900/80 px-4 py-2 rounded-full mt-4 md:mt-0 font-medium border border-slate-700"><i class="far fa-clock mr-2"></i>${new Date(m.timestamp).toLocaleString('tr-TR')}</span>
                    </div>
                    <div class="relative">
                        <i class="fas fa-quote-left absolute text-slate-700 text-3xl -top-2 -left-2 opacity-30"></i>
                        <p class="text-slate-200 bg-dark-900 p-6 rounded-xl whitespace-pre-wrap text-lg leading-relaxed font-sans border border-slate-700/30 ml-4">${m.message}</p>
                    </div>
                    <div class="mt-6 flex justify-end">
                        <button onclick="window.adminDelete('messages','${m.id}')" class="text-[#FF0000] hover:text-red-400 bg-[#FF0000]/10 hover:bg-[#FF0000]/20 px-6 py-2.5 rounded-lg transition-colors flex items-center font-bold shadow-sm"><i class="fas fa-trash-alt mr-2"></i> Mesajı Sil</button>
                    </div>
                </div>`).join('') + `</div>`; 
            }
            else if(t === 'about') { content = `<textarea id="a-about" class="w-full h-64 bg-dark-900 border border-slate-600 rounded-lg p-4 text-white focus:border-gold-400 outline-none">${window.state.data.about}</textarea><button onclick="window.adminSaveAbout()" class="mt-6 bg-gold-500 hover:bg-gold-400 text-dark-900 px-8 py-3 rounded-lg font-bold transition-colors">Değişiklikleri Kaydet</button>`; } 
            else if(t === 'users') { content = `<div class="space-y-3">` + window.state.dbUsers.map(u => `<div class="bg-dark-800 p-4 rounded-lg flex justify-between items-center border border-slate-700 hover:border-gold-500/30 transition-colors"><div><span class="text-gold-400 font-bold">${u.name} ${u.surname}</span> <span class="text-sm text-slate-400 ml-2">(${u.email})</span></div><div><button onclick="window.showUserInfo('${u.id}')" class="text-blue-400 hover:text-blue-300 mr-4"><i class="fas fa-info-circle text-xl"></i></button><button onclick="window.adminDelete('users','${u.id}')" class="text-[#FF0000] hover:text-red-400"><i class="fas fa-user-times text-xl"></i></button></div></div>`).join('') + `</div>`; }

            return `<div class="max-w-6xl mx-auto px-4 py-12"><h2 class="text-4xl font-serif font-bold text-white mb-8"><i class="fas fa-crown text-gold-400 mr-3"></i>Yönetici Paneli</h2><div class="flex flex-wrap gap-3 mb-8 border-b border-slate-700 pb-6">
                <button onclick="window.setAdminTab('blogs')" class="px-6 py-3 rounded-xl font-bold transition-colors ${t==='blogs'?'bg-gold-500 text-dark-900 shadow-lg shadow-gold-500/20':'bg-dark-800 text-slate-300 hover:bg-slate-700'}">Bloglar</button>
                <button onclick="window.setAdminTab('library')" class="px-6 py-3 rounded-xl font-bold transition-colors ${t==='library'?'bg-gold-500 text-dark-900 shadow-lg shadow-gold-500/20':'bg-dark-800 text-slate-300 hover:bg-slate-700'}">Kütüphane</button>
                <button onclick="window.setAdminTab('tutorials')" class="px-6 py-3 rounded-xl font-bold transition-colors ${t==='tutorials'?'bg-gold-500 text-dark-900 shadow-lg shadow-gold-500/20':'bg-dark-800 text-slate-300 hover:bg-slate-700'}">Eğitimler</button>
                <button onclick="window.setAdminTab('users')" class="px-6 py-3 rounded-xl font-bold transition-colors ${t==='users'?'bg-gold-500 text-dark-900 shadow-lg shadow-gold-500/20':'bg-dark-800 text-slate-300 hover:bg-slate-700'}">Kullanıcılar</button>
                <button onclick="window.setAdminTab('messages')" class="px-6 py-3 rounded-xl font-bold transition-colors relative ${t==='messages'?'bg-gold-500 text-dark-900 shadow-lg shadow-gold-500/20':'bg-dark-800 text-slate-300 hover:bg-slate-700'}">
                    Mesajlar ${window.state.data.messages.length > 0 ? `<span class="absolute -top-2 -right-2 bg-[#FF0000] text-white text-xs w-6 h-6 flex items-center justify-center rounded-full border-2 border-dark-900 shadow-sm shadow-red-500/50">${window.state.data.messages.length}</span>` : ''}
                </button>
                <button onclick="window.setAdminTab('about')" class="px-6 py-3 rounded-xl font-bold transition-colors ${t==='about'?'bg-gold-500 text-dark-900 shadow-lg shadow-gold-500/20':'bg-dark-800 text-slate-300 hover:bg-slate-700'}">Hakkımızda</button>
            </div><div class="glass-panel p-8 rounded-2xl shadow-xl">${content}</div></div>`;
        }

        window.handleAudioFile = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2) + " MB";
            document.getElementById('edit-l-size').value = sizeMB;
            
            const objectUrl = URL.createObjectURL(file);
            const audio = new Audio(objectUrl);
            audio.onloadedmetadata = () => {
                const mins = Math.floor(audio.duration / 60);
                const secs = Math.floor(audio.duration % 60).toString().padStart(2, '0');
                document.getElementById('edit-l-duration').value = `${mins}:${secs}`;
                URL.revokeObjectURL(objectUrl);
            };

            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('edit-l-url').value = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.showUserInfo = (id) => { const u = window.state.dbUsers.find(x => x.id === id); window.showModal("Kullanıcı Detayları", `Ad Soyad: ${u.name} ${u.surname}\nE-posta: ${u.email}\nGiriş Yöntemi: ${u.provider.toUpperCase()}\nŞifre: ${u.password || 'Google Hesabı'}`); };
        window.adminSaveAbout = async () => { await setDocFn(docFn(db, 'artifacts', window.state.appId, 'settings', 'about'), { text: document.getElementById('a-about').value }); window.showModal("Başarılı", "Hakkımızda yazısı güncellendi."); };
        
        window.adminDelete = (col, id) => { window.state.adminAction = { action: 'delete', collection: col, id }; window.render(); };
        window.executeDelete = async (col, id) => { await deleteDocFn(docFn(db, 'artifacts', window.state.appId, col, id)); window.cancelAdminAction(); window.showModal("Başarılı", "Silme işlemi tamamlandı."); };
        
        window.adminEditBlog = (id) => { window.state.adminAction = { action: 'edit-blog', id }; window.render(); };
        window.saveBlog = async (id) => {
            const newId = id || `b_${Date.now()}`;
            const b = id ? window.state.data.blogs.find(x=>x.id===id) : {id: newId, views: 0, likes: 0, date: new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' })};
            const title = document.getElementById('edit-b-title').value;
            const image = document.getElementById('edit-b-image').value || "https://images.unsplash.com/photo-1552422535-c45813c61732";
            const excerpt = document.getElementById('edit-b-excerpt').value;
            const content = document.getElementById('edit-b-content').value;
            if(!title) return window.showModal("Hata", "Başlık alanı zorunludur.");
            await setDocFn(docFn(db, 'artifacts', window.state.appId, 'blogs', newId), { ...b, title, image, excerpt, content });
            window.cancelAdminAction(); window.showModal("Başarılı", "Blog başarıyla kaydedildi.");
        };

        window.adminEditLibrary = (id) => { window.state.adminAction = { action: 'edit-library', id }; window.render(); };
        window.saveLibrary = async (id) => {
            const newId = id || `l_${Date.now()}`;
            const l = id ? window.state.data.library.find(x=>x.id===id) : {id: newId};
            const title = document.getElementById('edit-l-title').value;
            const type = document.getElementById('edit-l-type').value;
            const url = document.getElementById('edit-l-url').value;
            const note = document.getElementById('edit-l-note').value;
            const duration = document.getElementById('edit-l-duration').value || "0:00";
            const size = document.getElementById('edit-l-size').value || "0 MB";
            if(!title || !url) return window.showModal("Hata", "Başlık ve MP3 URL'si (veya dosya seçimi) zorunludur.");
            
            try {
                await setDocFn(docFn(db, 'artifacts', window.state.appId, 'library', newId), { ...l, title, type, url, note, duration, size });
                window.cancelAdminAction(); window.showModal("Başarılı", "Kütüphane öğesi başarıyla kaydedildi.");
            } catch(e) {
                window.showModal("Limit Hatası", "Bilgisayardan büyük bir dosya seçtiniz ve bu durum 1MB'lık standart veritabanı sınırına takıldı.\n\nLütfen bunun yerine dosyayı bir yere yükleyip URL adresini 'MP3 Dosya URL'si' kutusuna yapıştırarak kaydedin.");
            }
        };

        window.adminEditTutorial = (id) => { window.state.adminAction = { action: 'edit-tutorial', id }; window.render(); };
        window.saveTutorial = async (id) => {
            const newId = id || `t_${Date.now()}`;
            const t = id ? window.state.data.tutorials.find(x=>x.id===id) : {id: newId};
            const title = document.getElementById('edit-t-title').value;
            const youtubeId = document.getElementById('edit-t-youtubeId').value;
            const notes = document.getElementById('edit-t-notes').value;
            if(!title || !youtubeId) return window.showModal("Hata", "Eğitim başlığı ve YouTube ID'si zorunludur.");
            await setDocFn(docFn(db, 'artifacts', window.state.appId, 'tutorials', newId), { ...t, title, youtubeId, notes });
            window.cancelAdminAction(); window.showModal("Başarılı", "Eğitim başarıyla kaydedildi.");
        };

        const searchIndex = () => [...window.state.data.library.map(i=>({type:'Kütüphane',title:i.title,desc:i.type,link:'library'})), ...window.state.data.blogs.map(i=>({type:'Blog',title:i.title,desc:i.excerpt,link:'blog'})), ...window.state.data.tutorials.map(i=>({type:'Eğitim',title:i.title,desc:i.notes,link:'tutorial'}))];
        window.openSearch = () => { document.getElementById('search-modal').classList.remove('hidden'); document.getElementById('global-search-input').value = ''; document.getElementById('search-results').classList.add('hidden'); document.getElementById('search-empty').classList.remove('hidden'); setTimeout(() => document.getElementById('global-search-input').focus(), 100); };
        window.closeSearch = () => document.getElementById('search-modal').classList.add('hidden');
        document.getElementById('global-search-input').addEventListener('input', (e) => {
            const q = window.normalizeText(e.target.value), res = document.getElementById('search-results'), emp = document.getElementById('search-empty');
            if(q.length < 2) { res.classList.add('hidden'); emp.classList.remove('hidden'); return; }
            const matches = searchIndex().filter(i => q.split(' ').every(w => window.normalizeText(i.title+" "+i.desc).includes(w)));
            if(matches.length > 0) { emp.classList.add('hidden'); res.classList.remove('hidden'); res.innerHTML = matches.map(i => `<div class="p-4 border-b border-slate-700/50 hover:bg-dark-700 cursor-pointer group" onclick="window.navigate('${i.link}'); window.closeSearch()"><div class="text-xs text-gold-400 font-bold mb-1">${i.type}</div><div class="text-white font-serif text-lg group-hover:text-gold-300">${i.title}</div></div>`).join(''); } 
            else { res.classList.add('hidden'); emp.classList.remove('hidden'); emp.innerText = "Sonuç bulunamadı."; }
        });

        // EKRANIN BOŞ KALMAMASI İÇİN: 
        // Veritabanı yüklemesini hiç beklemeden siteyi hemen ekrana çizdiriyoruz.
        window.render();
    </script>
</body>
</html>
